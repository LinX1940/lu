<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>路</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .tips {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="tips">
        <h2>路</h2>
        <p>按 [D] 向右前行 | 按 [A] 向左回头 f5重开</p>
        <p>注意：阴影值过高会导致游戏结束</p>
    </div>

    <canvas id="gameCanvas"></canvas>
        <!-- 游戏画布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 【新增】手机端虚拟控制器 -->
    <div id="mobile-controls">
        <div class="touch-btn left-btn" id="btn-left">←</div>
        <div class="touch-btn right-btn" id="btn-right">→</div>
        <div class="touch-btn action-btn" id="btn-action">确认/下一页</div>
    </div>

    <div class="tips">
        <h2>人生历程</h2>
        <p class="desktop-only">按 [D] 向右 | 按 [A] 向左</p>
        <p class="mobile-only">点击屏幕左右按钮控制</p>
    </div>

    <style>
        /* 隐藏桌面端的提示，只在手机显示 */
        .mobile-only { display: none; }
        @media (max-width: 800px) {
            .desktop-only { display: none; }
            .mobile-only { display: block; }
            
            /* 移动端控制器样式 */
            #mobile-controls {
                position: absolute;
                bottom: 20px;
                width: 100%;
                display: flex;
                justify-content: space-between;
                padding: 0 40px;
                box-sizing: border-box;
                pointer-events: none; /* 让点击穿透到按钮上 */
                user-select: none;
                -webkit-user-select: none;
            }
            .touch-btn {
                width: 70px;
                height: 70px;
                background: rgba(255, 255, 255, 0.2);
                border: 2px solid rgba(255, 255, 255, 0.5);
                border-radius: 50%;
                color: white;
                font-size: 30px;
                display: flex;
                justify-content: center;
                align-items: center;
                pointer-events: auto; /* 按钮本身可点击 */
                backdrop-filter: blur(4px);
                touch-action: manipulation; /* 防止双击缩放 */
            }
            .touch-btn:active {
                background: rgba(255, 255, 255, 0.5);
                transform: scale(0.95);
            }
            .action-btn {
                position: absolute;
                right: 40px;
                bottom: 100px; /* 放在右上方一点，避免误触 */
                width: 60px;
                height: 60px;
                font-size: 14px;
                background: rgba(255, 215, 0, 0.3);
                border-color: gold;
            }
            /* 横屏优化 */
            @media (orientation: landscape) {
                #mobile-controls {
                    bottom: 10px;
                    padding: 0 20px;
                }
                .touch-btn {
                    width: 60px;
                    height: 60px;
                    font-size: 24px;
                }
                .action-btn {
                    bottom: 80px;
                    right: 20px;
                }
            }
        }
        /* 默认隐藏移动端控件，只有小屏幕才显示 */
        #mobile-controls { display: none; }
        @media (max-width: 800px) {
            #mobile-controls { display: flex; }
        }
    </style>

    <!-- 引入 JS -->
    <script src="game.js"></script>
    <!-- 引入刚才的 JS 文件 -->
    <script src="game.js"></script>
</body>
</html>
